            ].map(r => React.createElement('div', { key: r.id }, [
              React.createElement('label', { style: { fontWeight: 700, color: '#1e293b', display: 'block', fontSize: '18px', marginBottom: '8px' } }, r.label),
              React.createElement('p', { style: { fontSize: '14px', color: '#94a3b8', fontStyle: 'italic', marginBottom: '16px' } }, r.q),
              React.createElement('textarea', { 
                className: 'no-print',
                style: { width: '100%', background: '#f8fafc', border: '1px solid #e2e8f0', borderRadius: '16px', padding: '16px', minHeight: '120px', outline: 'none' },
                value: reflections[r.id],
                onChange: e => setReflections({...reflections, [r.id]: e.target.value}),
                placeholder: "Type your thoughts..."
              }),
              React.createElement('div', { className: 'print-only', style: { padding: '20px', border: '1px solid #f1f5f9', borderRadius: '16px', background: '#f8fafc', fontStyle: 'italic' } }, reflections[r.id] || "No reflection entered.")
            ]))),
            React.createElement('div', { className: 'no-print', style: { textAlign: 'center', marginTop: '48px', paddingTop: '32px', borderTop: '1px solid #f1f5f9' } }, 
              React.createElement('button', { 
                onClick: () => window.print(),
                className: 'btn-primary',
                style: { width: '100%', maxWidth: '400px' } 
              }, "Print Results")
            )
          ])
        ])
      ]);
    }

    const root = window.ReactDOM.createRoot(document.getElementById('aligned-wheel-wp-root'));
    root.render(React.createElement(App));
  }
})();
</script>
